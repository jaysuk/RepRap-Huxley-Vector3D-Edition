# This file contains common pin mappings for the BIGTREETECH Manta M5P
# To use this config, the firmware should be compiled for the
# STM32G0B1 with a "8KiB bootloader" "8 MHz crystal"
# and "USB (on PA11/PA12)" or "CAN bus (on PD0/PD1)".

# See docs/Config_Reference.md for a description of parameters.


[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_290045001950425938323120-if00

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100


[stepper_x]
step_pin: PC8
dir_pin: !PC9
enable_pin: !PA15
microsteps: 16
rotation_distance: 40
endstop_pin: ^PD3
position_endstop: 0
position_max: 120
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PD9
diag_pin: PD3
interpolate: False
run_current: 0.500 #1A Max
stealthchop_threshold: 0
driver_SGTHRS: 255  #sensorless homing sensitivity 0-255 (255 = most sensitive)

[stepper_y]
step_pin: PA10
dir_pin: !PA14
enable_pin: !PA13
microsteps: 16
rotation_distance: 40
endstop_pin: ^PD2
position_endstop: 0
position_max: 120
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PD8
diag_pin: PD2
interpolate: False
run_current: 0.500 #1A MAX
stealthchop_threshold: 0
driver_SGTHRS: 255  #sensorless homing sensitivity 0-255 (255 = most sensitive)

[stepper_z]
step_pin: PC6
dir_pin: PC7
enable_pin: !PA9
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
#position_endstop: 0.0
position_max: 70

[tmc2209 stepper_z]
uart_pin: PB10
run_current: 0.200 #0.7A Max
stealthchop_threshold: 0
interpolate: False
diag_pin: PC3

[extruder]
step_pin: PB12
dir_pin: !PB11
enable_pin: !PA8
microsteps: 16
rotation_distance: 22.23 #33.500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC5
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA1
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
min_temp: 0
max_temp: 250

[tmc2209 extruder]
uart_pin: PB2
run_current: 0.200 #0.7A Max
diag_pin: PC2


